<!DOCTYPE html>
<html>
<head>
    <title>Mystery Rad (Gezinkt)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        #canvas { border: 5px solid #444; border-radius: 50%; margin-top: 20px; }
        #result { font-size: 24px; margin-top: 20px; color: #ffeb3b; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #e91e63; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Das "Faire" Mystery Rad</h1>
    <canvas id="canvas" width="400" height="400"></canvas>
    <br><br>
    <button onclick="spin()">Drehen!</button>
    <div id="result">Klick auf Drehen...</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const options = ["Niete", "Kleiner Preis", "HAUPTGEWINN", "Niete", "Trostpreis", "Niete"];
        const colors = ["#333", "#555", "#FFD700", "#333", "#777", "#333"];
        
        let startAngle = 0;
        const arc = Math.PI / (options.length / 2);

        function drawWheel() {
            options.forEach((opt, i) => {
                const angle = startAngle + i * arc;
                ctx.fillStyle = colors[i];
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, angle, angle + arc, false);
                ctx.lineTo(200, 200);
                ctx.fill();
                ctx.save();
                ctx.fillStyle = "white";
                ctx.translate(200 + Math.cos(angle + arc / 2) * 130, 200 + Math.sin(angle + arc / 2) * 130);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                ctx.fillText(opt, -ctx.measureText(opt).width / 2, 0);
                ctx.restore();
            });
        }

        function spin() {
            // DER TRICK: 
            // Anstatt ein zufälliges Feld zu wählen, zwingen wir das Rad auf Feld Index 0 ("Niete")
            // oder geben dem "Hauptgewinn" nur eine Chance von 1%.
            
            const randomHit = Math.random();
            let forcedIndex;

            if (randomHit > 0.95) { 
                forcedIndex = 2; // Nur 5% Chance auf Hauptgewinn
            } else {
                forcedIndex = 0; // 95% Chance auf Niete
            }

            // Berechnung der Rotation, damit der Marker am Ende auf forcedIndex zeigt
            const totalDegrees = 360 * 5; // 5 volle Umdrehungen
            const stopAngle = (options.length - forcedIndex) * (360 / options.length) - (360 / options.length / 2);
            
            // Animation (vereinfacht)
            canvas.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.2, 1)";
            canvas.style.transform = `rotate(${totalDegrees + stopAngle}deg)`;

            setTimeout(() => {
                document.getElementById('result').innerText = "Ergebnis: " + options[forcedIndex];
            }, 4000);
        }

        drawWheel();
    </script>
</body>
</html>
