<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Zufall</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

   <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/dice.png">



    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: white;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .corner {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 9999;
        }
        #tl { top: 0; left: 0; }
        #tr { top: 0; right: 0; }

        .content { text-align: center; }
        #num { font-size: 8rem; font-weight: bold; margin: 20px 0; }
        .btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn:active { transform: scale(0.98); background: #444; }
    </style>
</head>
<body>

    <div id="tl" class="corner" onclick="rig(7)"></div>
    <div id="tr" class="corner" onclick="rig(13)"></div>

    <div class="content">
        <div style="color: #666;">Generator (1-50)</div>
        <div id="num">?</div>
        <button class="btn" onclick="roll()">START</button>
    </div>

    <script>
        let next = null;
        function rig(n) { next = n; if(navigator.vibrate) navigator.vibrate(15); }

        function roll() {
            const el = document.getElementById('num');
            let count = 0;
            const t = setInterval(() => {
                // Animation zeigt jetzt nur Zahlen bis 50
                el.innerText = Math.floor(Math.random() * 50) + 1;
                
                if (++count > 20) {
                    clearInterval(t);
                    // Finale Zahl: Entweder deine gezinkte ODER echter Zufall bis 50
                    el.innerText = next || Math.floor(Math.random() * 50) + 1;
                    next = null;
                }
            }, 50);
        }
    </script>
</body>
</html>
